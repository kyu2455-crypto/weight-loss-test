<script>
  function calculateLoss() {
    const original = parseFloat(document.getElementById("originalWeight").value);
    const current = parseFloat(document.getElementById("currentWeight").value);
    const errorEl = document.getElementById("error");
    const resultEl = document.getElementById("result");

    errorEl.textContent = "";
    resultEl.style.display = "none";

    if (isNaN(original) || isNaN(current) || original <= 0 || current <= 0) {
      errorEl.textContent = "올바른 몸무게를 입력해주세요.";
      return;
    }

    const diff = current - original;
    const percent = (Math.abs(diff) / original) * 100;

    if (diff < 0) {
      resultEl.textContent = `${Math.abs(diff).toFixed(1)}kg 감량, 원래 몸무게 대비 ${percent.toFixed(2)}% 감량했습니다.`;
    } else if (diff > 0) {
      resultEl.textContent = `${diff.toFixed(1)}kg 증가, 원래 몸무게 대비 ${percent.toFixed(2)}% 증가했습니다.`;
    } else {
      resultEl.textContent = "몸무게 변화가 없습니다.";
    }

    resultEl.style.display = "block";
  }
</script>
